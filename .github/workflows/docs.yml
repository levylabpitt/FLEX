name: docs

on:
  push:
    branches: [main, v2]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install mkdocs-material "mkdocstrings[python]>=0.26" \
            mkdocs-gen-files==0.5.0 mkdocs-literate-nav==0.6.1
          pip install -e packages/flex-core -e packages/flex-protocols \
            -e packages/flex-db -e packages/flex-drivers -e packages/flex-datatypes \
            -e packages/flex-exp -e packages/flex-nextcloud -e packages/flex-asana \
            -e packages/flex
      - run: mkdocs gh-deploy --force
