site_name: FLEX
site_description: Framework for Laboratory EXperiments
site_url: https://flex.levylab.org
repo_url: https://github.com/levylabpitt/flex
repo_name: levylabpitt/flex
edit_uri: edit/v2/docs/

theme:
  name: material
  logo: flex-logo-header.png
  favicon: flex-logo-v2.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest

plugins:
  - search
  - gen-files:
      scripts:
        - scripts/gen_reference.py
  - literate-nav
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            members_order: source
            docstring_style: google
            filters: ["!^_"]

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting started:
      - Quickstart: quickstart.md
      - Hardware checklist: hardware-checklist.md
  - Concepts:
      - Architecture: concepts/architecture.md
      - Instruments & drivers: concepts/instruments.md
      - Experiments & data: concepts/experiments.md
      - Ecosystems & stations: concepts/ecosystems.md
      - Dashboard & CLI: concepts/dashboard.md
  - Tutorials:
      - Write a driver: tutorials/write-a-driver.md
      - Build an ecosystem: build-an-ecosystem.md
      - LevyLab setup: levylab.md
  - Reference:
      - Drivers: reference/drivers/
      - Integrations: reference/integrations/
      - CLI: reference/cli.md
  - Migrating from v1: migration-v1-to-v2.md
