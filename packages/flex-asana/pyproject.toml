[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flex-asana"
version = "2.0.0a1"
description = "Asana comms backend: an experiment task per run, via the Asana API directly"
license = "MIT"
requires-python = ">=3.11"
# asana<6: the v3 SDK line lacks asana.rest (ApiException lives there in v5.x).
dependencies = ["flex-core", "asana>=5,<6"]

[tool.hatch.build.targets.wheel]
packages = ["src/flex_asana"]
