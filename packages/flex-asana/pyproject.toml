[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flex-asana"
version = "2.0.0a1"
description = "FLEX hooks for Asana project tracking (via n8n webhooks)"
license = "MIT"
requires-python = ">=3.11"
dependencies = ["flex-core", "requests>=2.31"]

[project.entry-points."flex.hooks"]
asana = "flex_asana.hooks"

[tool.hatch.build.targets.wheel]
packages = ["src/flex_asana"]
