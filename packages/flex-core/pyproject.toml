[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flex-core"
version = "2.0.0a1"
description = "FLEX core: instrument model, data & metadata services, package manager, ecosystem configuration, CLI"
license = "MIT"
requires-python = ">=3.11"
dependencies = [
    "numpy>=1.26",
    "pydantic>=2.7",
    "typer>=0.12",
    "rich>=13",
    "platformdirs>=4",
    "tqdm>=4.66",
    "tomlkit>=0.12",
    "fastapi>=0.110",
    "uvicorn>=0.29",
]

[project.scripts]
flex = "flex.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["src/flex"]
