[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flex-dashboard"
version = "2.0.0a1"
description = "FLEX dashboard: local web UI for package management, configuration, and experiment browsing"
license = "MIT"
requires-python = ">=3.11"
dependencies = ["flex-core", "fastapi>=0.110", "uvicorn>=0.29"]

[tool.hatch.build.targets.wheel]
packages = ["src/flex_dashboard"]
