<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FLEX Dashboard</title>
<style>
  :root {
    --bg: #0f172a; --panel: #1e293b; --line: #334155;
    --text: #e2e8f0; --dim: #64748b; --accent: #4ade80; --bad: #f87171;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: 'JetBrains Mono', 'Fira Code', Consolas, monospace; font-size: 14px;
  }
  header {
    display: flex; align-items: baseline; gap: 24px;
    padding: 18px 28px; border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 15px; letter-spacing: 3px; margin: 0; color: var(--accent); }
  header h1::before { content: '\25CF  '; }
  nav { display: flex; gap: 4px; }
  nav button {
    background: none; border: 1px solid transparent; color: var(--dim);
    font: inherit; padding: 6px 14px; cursor: pointer; border-radius: 6px;
    letter-spacing: 1px; text-transform: uppercase; font-size: 11px;
  }
  nav button.active { color: var(--text); border-color: var(--line); background: var(--panel); }
  main { padding: 24px 28px; max-width: 1100px; }
  h2 { font-size: 11px; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin: 22px 0 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 10px; font-size: 10px; letter-spacing: 2px;
       color: var(--dim); text-transform: uppercase; border-bottom: 1px solid var(--line); }
  td { padding: 8px 10px; border-bottom: 1px solid var(--panel); color: #94a3b8; }
  td:first-child { color: var(--text); font-weight: 600; }
  .ok { color: var(--accent); } .bad { color: var(--bad); } .dim { color: var(--dim); }
  button.action {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    font: inherit; font-size: 11px; padding: 4px 12px; border-radius: 5px; cursor: pointer;
  }
  button.action:hover { border-color: var(--accent); }
  button.action:disabled { opacity: .4; cursor: wait; }
  textarea {
    width: 100%; min-height: 340px; background: var(--panel); color: var(--text);
    border: 1px solid var(--line); border-radius: 8px; padding: 14px; font: inherit; font-size: 13px;
  }
  .toast {
    position: fixed; bottom: 22px; right: 24px; padding: 10px 18px; border-radius: 8px;
    background: var(--panel); border: 1px solid var(--accent); display: none; max-width: 480px;
  }
  .toast.error { border-color: var(--bad); }
  .path { color: var(--dim); font-size: 12px; margin: 6px 0 12px; }
  a { color: var(--accent); text-decoration: none; cursor: pointer; }
</style>
</head>
<body>
<header>
  <h1>FLEX</h1>
  <nav id="nav"></nav>
</header>
<main id="main"></main>
<div class="toast" id="toast"></div>

<script>
const TABS = ["Packages", "Ecosystem", "Instruments", "Experiments"];
let current = "Packages";

const $ = (s) => document.querySelector(s);
const esc = (s) => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function toast(message, isError = false) {
  const t = $("#toast");
  t.textContent = message;
  t.className = "toast" + (isError ? " error" : "");
  t.style.display = "block";
  setTimeout(() => (t.style.display = "none"), 4000);
}

async function api(path, options = {}) {
  const response = await fetch(path, {
    headers: { "Content-Type": "application/json" }, ...options,
  });
  if (!response.ok) {
    const body = await response.json().catch(() => ({}));
    throw new Error(body.detail || response.statusText);
  }
  return response.json();
}

function nav() {
  $("#nav").innerHTML = TABS.map(
    (t) => `<button class="${t === current ? "active" : ""}" onclick="show('${t}')">${t}</button>`
  ).join("");
}

async function show(tab) {
  current = tab;
  nav();
  $("#main").innerHTML = '<p class="dim">loading…</p>';
  try {
    await ({ Packages: packages, Ecosystem: ecosystem, Instruments: instruments, Experiments: experiments }[tab])();
  } catch (e) {
    $("#main").innerHTML = `<p class="bad">${esc(e.message)}</p>`;
  }
}

async function act(button, path, refresh) {
  button.disabled = true;
  try { await api(path, { method: "POST" }); toast("Done"); await refresh(); }
  catch (e) { toast(e.message, true); button.disabled = false; }
}

// -- Packages ----------------------------------------------------------------

async function packages() {
  const [pkgs, drivers] = await Promise.all([api("/api/packages"), api("/api/drivers")]);
  const groups = [...new Set(pkgs.map((p) => p.group))];
  let html = "";
  for (const group of groups) {
    html += `<h2>${esc(group)}</h2><table><tr><th>Package</th><th>Version</th><th>Summary</th><th></th></tr>`;
    for (const p of pkgs.filter((x) => x.group === group)) {
      const status = p.installed ? `<span class="ok">${esc(p.installed)}</span>` : '<span class="dim">not installed</span>';
      const button = p.installed
        ? (p.default ? "" : `<button class="action" onclick="act(this,'/api/packages/${p.name}/remove',packages)">remove</button>`)
        : `<button class="action" onclick="act(this,'/api/packages/${p.name}/install',packages)">install</button>`;
      html += `<tr><td>${esc(p.name)}</td><td>${status}</td><td>${esc(p.summary)}</td><td>${button}</td></tr>`;
    }
    html += "</table>";
  }
  html += `<h2>Drivers</h2><table><tr><th>Driver</th><th>Package</th><th>Status</th><th></th></tr>`;
  for (const d of drivers) {
    const status = d.enabled ? '<span class="ok">enabled</span>'
      : d.available ? '<span class="dim">installed</span>' : '<span class="dim">not installed</span>';
    const button = d.enabled
      ? `<button class="action" onclick="act(this,'/api/drivers/${d.name}/disable',packages)">disable</button>`
      : `<button class="action" onclick="act(this,'/api/drivers/${d.name}/enable',packages)">enable</button>`;
    html += `<tr><td>${esc(d.name)}</td><td>${esc(d.package)}</td><td>${status}</td><td>${button}</td></tr>`;
  }
  $("#main").innerHTML = html + "</table>";
}

// -- Ecosystem ---------------------------------------------------------------

async function ecosystem() {
  const raw = await api("/api/config/raw");
  $("#main").innerHTML = `
    <h2>Active configuration</h2>
    <p class="path">${esc(raw.path)}</p>
    <textarea id="cfg" spellcheck="false">${esc(raw.text)}</textarea>
    <p>
      <button class="action" onclick="saveConfig()">save</button>
      <button class="action" onclick="useManifest()">activate manifest…</button>
    </p>`;
}

async function saveConfig() {
  try {
    await api("/api/config/raw", { method: "PUT", body: JSON.stringify({ text: $("#cfg").value }) });
    toast("Configuration saved");
  } catch (e) { toast(e.message, true); }
}

async function useManifest() {
  const path = prompt("Path to ecosystem manifest (.toml):");
  if (!path) return;
  try {
    const result = await api("/api/ecosystem/use", { method: "POST", body: JSON.stringify({ path }) });
    toast(`Ecosystem '${result.ecosystem}' activated`);
    ecosystem();
  } catch (e) { toast(e.message, true); }
}

// -- Instruments -------------------------------------------------------------

async function instruments() {
  const stations = await api("/api/stations");
  if (!Object.keys(stations).length) {
    $("#main").innerHTML = '<p class="dim">No stations defined in the active configuration.</p>';
    return;
  }
  let html = "";
  for (const [station, insts] of Object.entries(stations)) {
    html += `<h2>${esc(station)}</h2><table><tr><th>Instrument</th><th>Driver</th><th>Address</th><th></th><th id="probe-h"></th></tr>`;
    for (const [name, i] of Object.entries(insts)) {
      html += `<tr><td>${esc(name)}</td><td>${esc(i.driver)}</td><td>${esc(i.address || "—")}</td>
        <td><button class="action" onclick="probe(this,'${esc(station)}','${esc(name)}')">probe</button></td>
        <td id="probe-${esc(station)}-${esc(name)}"></td></tr>`;
    }
    html += "</table>";
  }
  $("#main").innerHTML = html;
}

async function probe(button, station, name) {
  button.disabled = true;
  const cell = $(`#probe-${CSS.escape(station)}-${CSS.escape(name)}`);
  cell.innerHTML = '<span class="dim">connecting…</span>';
  try {
    const result = await api(`/api/instruments/${station}/${name}/probe`, { method: "POST" });
    cell.innerHTML = result.ok
      ? `<span class="ok">${esc(result.idn.model || "ok")}</span>`
      : `<span class="bad">${esc(result.error)}</span>`;
  } catch (e) { cell.innerHTML = `<span class="bad">${esc(e.message)}</span>`; }
  button.disabled = false;
}

// -- Experiments -------------------------------------------------------------

async function experiments() {
  const list = await api("/api/experiments");
  let html = `<h2>Recent experiments</h2><table><tr><th>ID</th><th>User</th><th>Name</th><th>Start</th><th>End</th></tr>`;
  for (const e of list) {
    html += `<tr><td><a onclick="detail('${esc(e.id)}')">${esc(e.id)}</a></td><td>${esc(e.user)}</td>
      <td>${esc(e.name || "—")}</td><td>${esc(e.start_time || "—")}</td>
      <td>${e.end_time ? esc(e.end_time) : '<span class="ok">running</span>'}</td></tr>`;
  }
  $("#main").innerHTML = html + "</table><div id='detail'></div>";
}

async function detail(id) {
  const d = await api(`/api/experiments/${id}`);
  let html = `<h2>Measurements — ${esc(id)}</h2><table><tr><th>ID</th><th>Name</th><th>Start</th><th>Aborted</th><th>File</th></tr>`;
  for (const m of d.measurements) {
    html += `<tr><td>${esc(m.id)}</td><td>${esc(m.name || "—")}</td><td>${esc(m.start_time || "—")}</td>
      <td>${m.aborted ? '<span class="bad">yes</span>' : "no"}</td><td>${esc(m.file ? m.file.uri : "—")}</td></tr>`;
  }
  html += "</table>";
  if (d.notes.length) {
    html += `<h2>Notes</h2><table><tr><th>Time</th><th>Kind</th><th>Text</th></tr>`;
    for (const n of d.notes) {
      html += `<tr><td>${esc(n.time || "—")}</td><td>${esc(n.kind)}</td><td>${esc(n.text)}</td></tr>`;
    }
    html += "</table>";
  }
  $("#detail").innerHTML = html;
}

nav();
show(current);
</script>
</body>
</html>
