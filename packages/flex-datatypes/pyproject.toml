[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flex-datatypes"
version = "2.0.0a1"
description = "FLEX measurement data file writers: HDF5 and TDMS"
license = "MIT"
requires-python = ">=3.11"
dependencies = ["flex-core", "h5py>=3.10", "npTDMS>=1.9"]

[tool.hatch.build.targets.wheel]
packages = ["src/flex_datatypes"]
