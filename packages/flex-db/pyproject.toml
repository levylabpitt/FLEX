[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flex-db"
version = "2.0.0a1"
description = "FLEX metadata database backends: SQLite (default) and PostgreSQL"
license = "MIT"
requires-python = ">=3.11"
dependencies = ["flex-core"]

[project.optional-dependencies]
postgres = ["psycopg[binary]>=3.1"]

[tool.hatch.build.targets.wheel]
packages = ["src/flex_db"]
