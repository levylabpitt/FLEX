[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flex-drivers"
version = "2.0.0a1"
description = "FLEX instrument drivers, organized by vendor (including LevyLab)"
license = "MIT"
requires-python = ">=3.11"
dependencies = ["flex-core", "flex-protocols[all]"]

[tool.hatch.build.targets.wheel]
packages = ["src/flex_drivers"]
