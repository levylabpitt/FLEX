[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flex-exp"
version = "2.0.0a1"
description = "FLEX experiment handling: Experiment, Measurement, Scan, and optional lab sessions"
license = "MIT"
requires-python = ">=3.11"
dependencies = ["flex-core", "flex-db"]

[tool.hatch.build.targets.wheel]
packages = ["src/flex_exp"]
