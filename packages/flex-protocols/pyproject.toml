[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flex-protocols"
version = "2.0.0a1"
description = "FLEX protocol instrument base classes: VISA, TCP, Serial, ZMQ"
license = "MIT"
requires-python = ">=3.11"
dependencies = ["flex-core"]

[project.optional-dependencies]
visa = ["pyvisa>=1.14"]
zmq = ["pyzmq>=25"]
serial = ["pyserial>=3.5"]
all = ["pyvisa>=1.14", "pyzmq>=25", "pyserial>=3.5"]

[tool.hatch.build.targets.wheel]
packages = ["src/flex_protocols"]
